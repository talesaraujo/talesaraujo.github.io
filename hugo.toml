baseURL = "https://talesaraujo.github.io/"
title = "Tales Araujo"
theme = "hugo-coder"
defaultContentLanguage = "en"
enableEmoji = true

[pagination]
  pagerSize = 6

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  author = "Tales Araujo"
  avatarURL = "images/avatar.jpeg"
  dateFormat = "January 2, 2006"
  colorScheme = "auto"
  hideColorSchemeToggle = false
  customSCSS = ["scss/custom.scss"]

[[params.social]]
  name = "Github"
  icon = "fa-brands fa-github fa-2x"
  weight = 1
  url = "https://github.com/talesaraujo"

[[params.social]]
  name = "LinkedIn"
  icon = "fa-brands fa-linkedin fa-2x"
  weight = 2
  url = "https://www.linkedin.com/in/talesaraujo/"

[[params.social]]
  name = "Email"
  icon = "fa-solid fa-envelope fa-2x"
  weight = 3
  url = "mailto:talesaraujodossantos@gmail.com"

